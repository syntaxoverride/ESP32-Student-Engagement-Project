[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_flags = 
    --before=no_reset
    --after=hard_reset
    --chip=esp32
board_build.partitions = default.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

; Build flags
; STATION_NUMBER is set dynamically via VS Code tasks or command line
; Default to 1 if not specified
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DSTATION_NUMBER=5

; Library dependencies
; No external libraries needed - using ESP32 built-in touch sensor and digital I/O
lib_deps = 